<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>战斗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px; height: 500px;
      background-color: #0d0d1a;
      background-image: linear-gradient(180deg, #1a1040 0%, #0d0d1a 30%, #0a0a18 100%);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex; flex-direction: column;
      padding: 10px; gap: 6px;
      color: #e0e0f0;
      border: 2px solid #7b61ff40;
    }

    .top-bar {
      display: flex; flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    .turn-info {
      font-size: 16px; font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b61ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .top-controls {
      display: flex; flex-direction: row;
      gap: 6px;
    }
    .ctrl-btn {
      width: 52px; height: 28px;
      background: rgba(26, 26, 62, 0.5);
      border: 1px solid #2a2a4e;
      border-radius: 8px;
      color: #6a6a8e;
      font-size: 12px;
      cursor: pointer;
    }
    .ctrl-btn.active {
      background: rgba(123, 97, 255, 0.15);
      border-color: #7b61ff;
      color: #7b61ff;
    }

    .battlefield {
      display: flex; flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .enemy-row, .ally-row {
      display: flex; flex-direction: row;
      justify-content: center;
      gap: 16px;
    }

    .unit-card {
      width: 80px;
      display: flex; flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .unit-avatar {
      width: 52px; height: 52px;
      background: rgba(26, 26, 62, 0.6);
      border: 2px solid #2a2a4e;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .unit-card.active-turn .unit-avatar {
      border-color: #00d4ff;
      box-shadow: 0 0 12px #00d4ff50;
    }
    .unit-name {
      font-size: 10px; color: #6a6a8e;
    }
    .unit-hp-bar {
      width: 68px; height: 5px;
      background-color: #1a1a3e;
      border: 1px solid #2a2a4e;
      border-radius: 3px;
    }
    .unit-hp-fill {
      height: 3px;
      background: linear-gradient(90deg, #ff4466, #ff6b9d);
      border-radius: 2px;
    }
    .unit-mp-bar {
      width: 68px; height: 3px;
      background-color: #1a1a3e;
      border: 1px solid #1a2050;
      border-radius: 2px;
    }
    .unit-mp-fill {
      height: 1px;
      background: linear-gradient(90deg, #4466ff, #00d4ff);
      border-radius: 1px;
    }

    .speed-bar {
      display: flex; flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 10px;
      background: rgba(26, 26, 62, 0.4);
      border: 1px solid #2a2a4e;
      border-radius: 10px;
    }
    .speed-label {
      font-size: 10px; color: #6a6a8e;
      margin-right: 6px;
    }
    .speed-unit {
      width: 30px; height: 30px;
      background: rgba(26, 26, 62, 0.6);
      border: 1px solid #2a2a4e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .speed-unit.current {
      border-color: #00d4ff;
      box-shadow: 0 0 8px #00d4ff40;
    }
    .speed-arrow {
      font-size: 10px;
      color: #2a2a4e;
    }

    .skill-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .skill-btn {
      height: 40px;
      background: rgba(26, 26, 62, 0.4);
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: #6a6a8e;
      font-size: 12px;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .skill-btn .skill-name { font-size: 12px; }
    .skill-btn .skill-cost { font-size: 9px; }
    .skill-btn.usable {
      border-color: #7b61ff40;
      color: #c0c0e0;
    }
    .skill-btn.on-cd {
      opacity: 0.3;
    }
    .skill-btn.no-mp {
      opacity: 0.4;
      color: #3a3a5e;
    }

    .battle-log {
      height: 36px;
      background: rgba(26, 26, 62, 0.3);
      border: 1px solid #2a2a4e;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      color: #6a6a8e;
    }
    .log-damage { color: #ff6b9d; }
    .log-heal { color: #00e89d; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span class="turn-info">回合 3 / 10</span>
    <div class="top-controls">
      <button class="ctrl-btn active">自动</button>
      <button class="ctrl-btn">加速</button>
      <button class="ctrl-btn">跳过</button>
    </div>
  </div>

  <div class="battlefield">
    <div class="enemy-row">
      <div class="unit-card">
        <div class="unit-avatar">👹</div>
        <span class="unit-name">暗影狼</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:75%"></div></div>
      </div>
      <div class="unit-card active-turn">
        <div class="unit-avatar">👿</div>
        <span class="unit-name">暗影狼王</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:92%"></div></div>
      </div>
      <div class="unit-card">
        <div class="unit-avatar">👹</div>
        <span class="unit-name">暗影狼</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:40%"></div></div>
      </div>
    </div>

    <div class="speed-bar">
      <span class="speed-label">顺序</span>
      <div class="speed-unit current">👿</div>
      <span class="speed-arrow">›</span>
      <div class="speed-unit">⚔</div>
      <span class="speed-arrow">›</span>
      <div class="speed-unit">👹</div>
      <span class="speed-arrow">›</span>
      <div class="speed-unit">🗡</div>
      <span class="speed-arrow">›</span>
      <div class="speed-unit">👹</div>
      <span class="speed-arrow">›</span>
      <div class="speed-unit">🛡</div>
    </div>

    <div class="ally-row">
      <div class="unit-card">
        <div class="unit-avatar">⚔</div>
        <span class="unit-name">暗影剑士</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:78%"></div></div>
        <div class="unit-mp-bar"><div class="unit-mp-fill" style="width:45%"></div></div>
      </div>
      <div class="unit-card">
        <div class="unit-avatar">🗡</div>
        <span class="unit-name">星辰法师</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:60%"></div></div>
        <div class="unit-mp-bar"><div class="unit-mp-fill" style="width:30%"></div></div>
      </div>
      <div class="unit-card">
        <div class="unit-avatar">🛡</div>
        <span class="unit-name">铁壁卫士</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:95%"></div></div>
        <div class="unit-mp-bar"><div class="unit-mp-fill" style="width:70%"></div></div>
      </div>
    </div>
  </div>

  <div class="skill-bar">
    <button class="skill-btn usable"><span class="skill-name">普攻</span><span class="skill-cost">MP 0</span></button>
    <button class="skill-btn usable"><span class="skill-name">暗影斩</span><span class="skill-cost">MP 20</span></button>
    <button class="skill-btn no-mp"><span class="skill-name">终极奥义</span><span class="skill-cost">MP 80</span></button>
    <button class="skill-btn usable"><span class="skill-name">旋风斩</span><span class="skill-cost">MP 15</span></button>
    <button class="skill-btn on-cd"><span class="skill-name">治疗术</span><span class="skill-cost">CD 2</span></button>
    <button class="skill-btn usable"><span class="skill-name">防御</span><span class="skill-cost">MP 0</span></button>
  </div>

  <div class="battle-log">
    <div class="log-damage">暗影狼王 对 暗影剑士 造成 156 伤害</div>
    <div class="log-heal">铁壁卫士 使用了 坚固壁垒，全体防御 +30%</div>
  </div>
</body>
</html>
