<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>战斗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px; height: 500px;
      background-color: #1a0f0a;
      background-image: linear-gradient(180deg, #1a1020 0%, #1a0f0a 30%, #0f0a05 100%);
      font-family: "SimHei", "Microsoft YaHei", serif;
      display: flex; flex-direction: column;
      padding: 10px; gap: 6px;
      color: #e8d5b5;
      border: 3px solid #8b6914;
    }

    .frame-top {
      height: 6px;
      background: linear-gradient(90deg, transparent, #c9a034, #8b6914, #c9a034, transparent);
    }

    .top-bar {
      display: flex; flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    .turn-info {
      font-size: 16px; font-weight: bold;
      color: #ffd700;
    }
    .top-controls {
      display: flex; flex-direction: row;
      gap: 6px;
    }
    .ctrl-btn {
      width: 56px; height: 28px;
      background-color: #2a1a10;
      border: 1px solid #5c4510;
      border-radius: 4px;
      color: #c9a034;
      font-size: 12px;
      cursor: pointer;
    }
    .ctrl-btn.active {
      background: linear-gradient(180deg, #5c4510, #3a2a08);
      border-color: #c9a034;
      color: #ffd700;
    }

    .battlefield {
      display: flex; flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .enemy-row {
      display: flex; flex-direction: row;
      justify-content: center;
      gap: 16px;
    }

    .unit-card {
      width: 80px;
      display: flex; flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .unit-card.active-turn {
      filter: brightness(1.2);
    }
    .unit-avatar {
      width: 56px; height: 56px;
      background-color: #2a1a10;
      border: 2px solid #5c4510;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .unit-card.active-turn .unit-avatar {
      border-color: #ffd700;
      box-shadow: 0 0 10px #c9a03480;
    }
    .unit-name {
      font-size: 11px;
      color: #a89070;
    }
    .unit-hp-bar {
      width: 70px; height: 6px;
      background-color: #0a0505;
      border: 1px solid #3a2510;
      border-radius: 3px;
    }
    .unit-hp-fill {
      height: 4px;
      background: linear-gradient(90deg, #8b2020, #cc3030);
      border-radius: 2px;
    }
    .unit-mp-bar {
      width: 70px; height: 4px;
      background-color: #0a0505;
      border: 1px solid #1a2050;
      border-radius: 2px;
    }
    .unit-mp-fill {
      height: 2px;
      background: linear-gradient(90deg, #2040a0, #3060cc);
      border-radius: 1px;
    }

    .speed-bar {
      display: flex; flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px;
      background-color: #1a0f0a;
      border: 1px solid #3a2510;
      border-radius: 6px;
    }
    .speed-label {
      font-size: 11px; color: #a89070;
      margin-right: 8px;
    }
    .speed-unit {
      width: 32px; height: 32px;
      background-color: #2a1a10;
      border: 1px solid #5c4510;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .speed-unit.current {
      border-color: #ffd700;
      box-shadow: 0 0 6px #c9a03460;
    }
    .speed-arrow {
      font-size: 12px;
      color: #5c4510;
    }

    .ally-row {
      display: flex; flex-direction: row;
      justify-content: center;
      gap: 16px;
    }

    .skill-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .skill-btn {
      height: 42px;
      background-color: #2a1a10;
      border: 1px solid #5c4510;
      border-radius: 6px;
      color: #e8d5b5;
      font-size: 13px;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .skill-btn .skill-name { font-size: 13px; }
    .skill-btn .skill-cost { font-size: 10px; color: #a89070; }
    .skill-btn.usable {
      border-color: #8b6914;
    }
    .skill-btn.on-cd {
      opacity: 0.4;
    }
    .skill-btn.no-mp {
      opacity: 0.5;
      color: #5c4510;
    }

    .battle-log {
      height: 40px;
      background-color: #1a0f0a;
      border: 1px solid #3a2510;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      color: #a89070;
    }
    .log-line {
      padding: 1px 0;
    }
    .log-damage { color: #cc5050; }
    .log-heal { color: #40c040; }

    .frame-bottom {
      height: 6px;
      background: linear-gradient(90deg, transparent, #c9a034, #8b6914, #c9a034, transparent);
    }
  </style>
</head>
<body>
  <div class="frame-top"></div>

  <div class="top-bar">
    <span class="turn-info">回合 3 / 10</span>
    <div class="top-controls">
      <button class="ctrl-btn active">自动</button>
      <button class="ctrl-btn">加速</button>
      <button class="ctrl-btn">跳过</button>
    </div>
  </div>

  <div class="battlefield">
    <div class="enemy-row">
      <div class="unit-card">
        <div class="unit-avatar">👹</div>
        <span class="unit-name">暗影狼</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:75%"></div></div>
      </div>
      <div class="unit-card active-turn">
        <div class="unit-avatar">👿</div>
        <span class="unit-name">暗影狼王</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:92%"></div></div>
      </div>
      <div class="unit-card">
        <div class="unit-avatar">👹</div>
        <span class="unit-name">暗影狼</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:40%"></div></div>
      </div>
    </div>

    <div class="speed-bar">
      <span class="speed-label">行动顺序</span>
      <div class="speed-unit current">👿</div>
      <span class="speed-arrow">→</span>
      <div class="speed-unit">⚔</div>
      <span class="speed-arrow">→</span>
      <div class="speed-unit">👹</div>
      <span class="speed-arrow">→</span>
      <div class="speed-unit">🗡</div>
      <span class="speed-arrow">→</span>
      <div class="speed-unit">👹</div>
      <span class="speed-arrow">→</span>
      <div class="speed-unit">🛡</div>
    </div>

    <div class="ally-row">
      <div class="unit-card">
        <div class="unit-avatar">⚔</div>
        <span class="unit-name">暗影剑士</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:78%"></div></div>
        <div class="unit-mp-bar"><div class="unit-mp-fill" style="width:45%"></div></div>
      </div>
      <div class="unit-card">
        <div class="unit-avatar">🗡</div>
        <span class="unit-name">星辰法师</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:60%"></div></div>
        <div class="unit-mp-bar"><div class="unit-mp-fill" style="width:30%"></div></div>
      </div>
      <div class="unit-card">
        <div class="unit-avatar">🛡</div>
        <span class="unit-name">铁壁卫士</span>
        <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:95%"></div></div>
        <div class="unit-mp-bar"><div class="unit-mp-fill" style="width:70%"></div></div>
      </div>
    </div>
  </div>

  <div class="skill-bar">
    <button class="skill-btn usable"><span class="skill-name">普攻</span><span class="skill-cost">MP 0</span></button>
    <button class="skill-btn usable"><span class="skill-name">暗影斩</span><span class="skill-cost">MP 20</span></button>
    <button class="skill-btn no-mp"><span class="skill-name">终极奥义</span><span class="skill-cost">MP 80</span></button>
    <button class="skill-btn usable"><span class="skill-name">旋风斩</span><span class="skill-cost">MP 15</span></button>
    <button class="skill-btn on-cd"><span class="skill-name">治疗术</span><span class="skill-cost">CD 2回合</span></button>
    <button class="skill-btn usable"><span class="skill-name">防御</span><span class="skill-cost">MP 0</span></button>
  </div>

  <div class="battle-log">
    <div class="log-line log-damage">暗影狼王 对 暗影剑士 造成 156 点伤害！</div>
    <div class="log-line log-heal">铁壁卫士 使用了 坚固壁垒，全体防御 +30%</div>
  </div>

  <div class="frame-bottom"></div>
</body>
</html>
