<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>召唤</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px; height: 500px;
      background-color: #0d0d1a;
      background-image: linear-gradient(160deg, #2a1a3e 0%, #0d0d1a 35%, #0a1628 100%);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex; flex-direction: column;
      padding: 12px; gap: 8px;
      color: #e0e0f0;
      border: 2px solid #7b61ff40;
    }

    .header {
      display: flex; flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    .header-left {
      display: flex; flex-direction: row;
      align-items: center; gap: 10px;
    }
    .back-btn {
      width: 32px; height: 32px;
      background: rgba(123, 97, 255, 0.15);
      border: 1px solid #7b61ff60;
      border-radius: 8px;
      color: #7b61ff;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .page-title {
      font-size: 20px; font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b61ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn-record {
      height: 28px;
      background: rgba(123, 97, 255, 0.1);
      border: 1px solid #7b61ff40;
      border-radius: 8px;
      color: #7b61ff;
      font-size: 12px;
      padding: 0 14px;
      cursor: pointer;
    }

    .summon-area {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .summon-circle {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, #3a2060 0%, #1a1040 50%, #0d0d1a 100%);
      border: 2px solid #7b61ff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 24px #7b61ff40, 0 0 48px #7b61ff18, inset 0 0 24px #7b61ff20;
    }
    .summon-icon { font-size: 44px; }

    .pool-tabs {
      display: flex; flex-direction: row;
      gap: 4px;
    }
    .pool-tab {
      flex: 1; height: 34px;
      background: rgba(26, 26, 62, 0.4);
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: #6a6a8e;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .pool-tab.active {
      background: rgba(123, 97, 255, 0.15);
      border-color: #7b61ff;
      color: #7b61ff;
    }
    .hot-tag {
      font-size: 10px;
      background: rgba(255, 107, 157, 0.2);
      border-radius: 4px;
      padding: 1px 4px;
      color: #ff6b9d;
    }

    .rate-info {
      display: flex; flex-direction: row;
      justify-content: center;
      gap: 16px;
      font-size: 12px;
      color: #6a6a8e;
    }
    .rate-ssr { color: #ffd700; }
    .rate-sr { color: #c850ff; }
    .rate-r { color: #00d4ff; }

    .gacha-buttons {
      display: flex; flex-direction: row;
      gap: 12px; justify-content: center;
    }
    .btn-gacha {
      width: 180px; height: 48px;
      border-radius: 12px;
      font-size: 15px; font-weight: bold;
      cursor: pointer;
      border: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .btn-single {
      background: rgba(123, 97, 255, 0.12);
      border: 1px solid #7b61ff60;
      color: #7b61ff;
    }
    .btn-ten {
      background: linear-gradient(135deg, #ff6b9d, #c850ff);
      color: #fff;
      box-shadow: 0 0 20px #c850ff40;
    }
    .gacha-cost {
      font-size: 11px;
      font-weight: normal;
      color: #8888aa;
    }

    .result-label {
      font-size: 12px; color: #6a6a8e;
      text-align: center;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }
    .result-card {
      height: 48px;
      background: rgba(26, 26, 62, 0.4);
      border: 1px solid #2a2a4e;
      border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 11px;
    }
    .result-card.rarity-r {
      border-color: #00d4ff60;
    }
    .result-card.rarity-sr {
      border-color: #c850ff60;
      box-shadow: 0 0 8px #c850ff30;
    }
    .result-card.rarity-ssr {
      border-color: #ffd70080;
      box-shadow: 0 0 12px #ffd70040;
    }
    .result-icon { font-size: 16px; }
    .result-rarity { font-size: 10px; color: #8888aa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <button class="back-btn">◀</button>
      <span class="page-title">召唤</span>
    </div>
    <button class="btn-record">抽卡记录</button>
  </div>

  <div class="summon-area">
    <div class="summon-circle">
      <span class="summon-icon">🔮</span>
    </div>
  </div>

  <div class="pool-tabs">
    <button class="pool-tab active">限定池 <span class="hot-tag">HOT</span></button>
    <button class="pool-tab">常驻池</button>
    <button class="pool-tab">友情池</button>
  </div>

  <div class="rate-info">
    <span>SSR <span class="rate-ssr">3%</span></span>
    <span>SR <span class="rate-sr">15%</span></span>
    <span>R <span class="rate-r">82%</span></span>
  </div>

  <div class="gacha-buttons">
    <button class="btn-gacha btn-single">
      单抽 ×1
      <span class="gacha-cost">200 钻石</span>
    </button>
    <button class="btn-gacha btn-ten">
      十连 ×10
      <span class="gacha-cost">1800 钻石</span>
    </button>
  </div>

  <div class="result-label">— 上次十连结果 —</div>
  <div class="result-grid">
    <div class="result-card"><span class="result-icon">⚔</span><span class="result-rarity">R</span></div>
    <div class="result-card rarity-r"><span class="result-icon">🗡</span><span class="result-rarity">R</span></div>
    <div class="result-card rarity-sr"><span class="result-icon">🛡</span><span class="result-rarity">SR</span></div>
    <div class="result-card"><span class="result-icon">💍</span><span class="result-rarity">R</span></div>
    <div class="result-card rarity-ssr"><span class="result-icon">⚡</span><span class="result-rarity">SSR</span></div>
    <div class="result-card"><span class="result-icon">🗡</span><span class="result-rarity">R</span></div>
    <div class="result-card rarity-r"><span class="result-icon">👢</span><span class="result-rarity">R</span></div>
    <div class="result-card rarity-sr"><span class="result-icon">🗡</span><span class="result-rarity">SR</span></div>
    <div class="result-card"><span class="result-icon">🛡</span><span class="result-rarity">R</span></div>
    <div class="result-card rarity-r"><span class="result-icon">⚔</span><span class="result-rarity">R</span></div>
  </div>
</body>
</html>
