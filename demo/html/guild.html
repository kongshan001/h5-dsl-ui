<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>公会</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px; height: 500px;
      background-color: #0d0d1a;
      background-image: linear-gradient(160deg, #1a1a3e 0%, #0d0d1a 40%, #0a1628 100%);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex; flex-direction: column;
      padding: 12px; gap: 8px;
      color: #e0e0f0;
      border: 2px solid #7b61ff40;
    }

    .header {
      display: flex; flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    .guild-info {
      display: flex; flex-direction: row;
      align-items: center; gap: 8px;
    }
    .guild-name {
      font-size: 20px; font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b61ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .guild-level {
      font-size: 11px;
      background: rgba(123, 97, 255, 0.12);
      border: 1px solid #7b61ff40;
      border-radius: 20px;
      padding: 2px 10px;
      color: #7b61ff;
    }
    .guild-count {
      font-size: 11px; color: #6a6a8e;
    }
    .btn-exit {
      height: 28px;
      background: rgba(255, 107, 157, 0.1);
      border: 1px solid #ff6b9d40;
      border-radius: 8px;
      color: #ff6b9d;
      font-size: 12px;
      padding: 0 14px;
      cursor: pointer;
    }

    .tab-bar {
      display: flex; flex-direction: row;
      gap: 2px;
      border-bottom: 1px solid #2a2a4e;
    }
    .tab {
      flex: 1; height: 32px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #6a6a8e;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .tab.active {
      color: #00d4ff;
      border-bottom-color: #00d4ff;
    }

    .notice-box {
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid #00d4ff20;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      color: #8888aa;
    }
    .notice-title {
      font-size: 12px; color: #00d4ff;
      margin-bottom: 4px;
    }

    .member-list {
      flex: 1;
      display: flex; flex-direction: column;
      background: rgba(26, 26, 62, 0.3);
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      overflow: hidden;
    }
    .member-header {
      display: flex; flex-direction: row;
      padding: 6px 12px;
      font-size: 11px; color: #6a6a8e;
      background: rgba(26, 26, 62, 0.5);
      border-bottom: 1px solid #2a2a4e;
    }
    .member-row {
      display: flex; flex-direction: row;
      align-items: center;
      padding: 7px 12px;
      border-bottom: 1px solid #1a1a3e;
    }
    .member-role { font-size: 14px; width: 28px; }
    .member-name { font-size: 13px; color: #e0e0f0; flex: 1; }
    .member-level { font-size: 11px; color: #7b61ff; width: 55px; text-align: center; }
    .member-status { font-size: 11px; width: 44px; text-align: center; }
    .online { color: #00e89d; }
    .offline { color: #3a3a5e; }

    .chat-area {
      display: flex; flex-direction: column;
      gap: 4px;
      background: rgba(26, 26, 62, 0.3);
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 8px;
      max-height: 90px;
    }
    .chat-msg {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 10px;
      max-width: 75%;
    }
    .chat-left {
      background: rgba(123, 97, 255, 0.1);
      border: 1px solid #7b61ff20;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
      color: #c0c0e0;
    }
    .chat-right {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid #00d4ff20;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
      color: #c0e8f0;
    }
    .chat-system {
      background: transparent;
      align-self: center;
      color: #6a6a8e;
      font-size: 11px;
    }

    .input-bar {
      display: flex; flex-direction: row;
      gap: 6px;
    }
    .chat-input {
      flex: 1; height: 34px;
      background: rgba(26, 26, 62, 0.5);
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      color: #e0e0f0;
      padding: 0 12px;
      font-size: 13px;
    }
    .btn-send {
      width: 64px; height: 34px;
      background: linear-gradient(135deg, #7b61ff, #00d4ff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }

    .col-name { flex: 1; }
    .col-level { width: 55px; text-align: center; }
    .col-status { width: 44px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="guild-info">
      <span class="guild-name">龙吟阁</span>
      <span class="guild-level">Lv.15</span>
      <span class="guild-count">成员 28/30</span>
    </div>
    <button class="btn-exit">退出公会</button>
  </div>

  <div class="tab-bar">
    <button class="tab active">成员</button>
    <button class="tab">动态</button>
    <button class="tab">公会战</button>
    <button class="tab">设置</button>
  </div>

  <div class="notice-box">
    <div class="notice-title">📢 公会公告</div>
    公会战将于今晚8点开始，请各位准时参加！贡献达标可领取稀有装备奖励。
  </div>

  <div class="member-list">
    <div class="member-header">
      <span style="width:28px"></span>
      <span class="col-name">名称</span>
      <span class="col-level">等级</span>
      <span class="col-status">状态</span>
    </div>
    <div class="member-row">
      <span class="member-role">👑</span>
      <span class="member-name">龙战天下</span>
      <span class="member-level">Lv.60</span>
      <span class="member-status online">在线</span>
    </div>
    <div class="member-row">
      <span class="member-role">⚔</span>
      <span class="member-name">暗影猎手</span>
      <span class="member-level">Lv.58</span>
      <span class="member-status online">在线</span>
    </div>
    <div class="member-row">
      <span class="member-role">⚔</span>
      <span class="member-name">星辰破晓</span>
      <span class="member-level">Lv.55</span>
      <span class="member-status offline">离线</span>
    </div>
    <div class="member-row">
      <span class="member-role">☆</span>
      <span class="member-name">剑心无痕</span>
      <span class="member-level">Lv.45</span>
      <span class="member-status online">在线</span>
    </div>
    <div class="member-row">
      <span class="member-role">☆</span>
      <span class="member-name">流云飞雪</span>
      <span class="member-level">Lv.42</span>
      <span class="member-status offline">离线</span>
    </div>
    <div class="member-row">
      <span class="member-role">☆</span>
      <span class="member-name">月影清风</span>
      <span class="member-level">Lv.38</span>
      <span class="member-status online">在线</span>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-msg chat-left">龙战天下：今晚公会战都准备好了吗？</div>
    <div class="chat-msg chat-right">没问题，我的队伍已经准备好了！</div>
    <div class="chat-msg chat-system">系统：公会战将于 20:00 开始</div>
  </div>

  <div class="input-bar">
    <input class="chat-input" placeholder="输入消息..." />
    <button class="btn-send">发送</button>
  </div>
</body>
</html>
