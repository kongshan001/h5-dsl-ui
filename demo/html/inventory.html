<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>背包</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 820px; height: 620px;
      background-color: #1a1a2e;
      font-family: "Microsoft YaHei", sans-serif;
      display: flex; flex-direction: column;
      padding: 20px; gap: 12px;
      align-items: center;
    }

    .title {
      color: #FFFFFF;
      font-size: 24px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .slot {
      width: 120px; height: 60px;
      background-color: #16213e;
      color: #e0e0e0;
      border-radius: 4px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    .slot:hover { background-color: #1a2744; }
    .slot.empty {
      background-color: #0f3460;
      color: #555555;
      cursor: default;
    }

    .detail {
      width: 520px; height: 80px;
      background-color: #16213e;
      border-radius: 6px;
      padding: 10px;
      display: flex; flex-direction: row;
      gap: 12px;
      color: #a0a0a0;
      font-size: 14px;
    }

    .close-btn {
      width: 120px; height: 36px;
      background-color: #e94560;
      color: #FFFFFF;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .close-btn:hover { background-color: #c73e54; }
  </style>
</head>
<body>
  <h1 class="title" id="title">背包 (2/20)</h1>

  <div class="grid" id="item_grid">
    <button class="slot" id="slot_0">木剑</button>
    <button class="slot" id="slot_1">药水x3</button>
    <button class="slot empty" id="slot_2"></button>
    <button class="slot empty" id="slot_3"></button>
    <button class="slot empty" id="slot_4"></button>
    <button class="slot empty" id="slot_5"></button>
    <button class="slot empty" id="slot_6"></button>
    <button class="slot empty" id="slot_7"></button>
  </div>

  <div class="detail">
    <span id="detail_text">选择一个物品查看详情...</span>
  </div>

  <button class="close-btn" id="close_btn">关闭</button>
</body>
</html>
